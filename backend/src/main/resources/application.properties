# ===============================
# Application
# ===============================
spring.application.name=blog
server.port=8080

# Pretty JSON for dev
spring.jackson.serialization.indent_output=true

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# Database: Postgres (default) / fallback to H2
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/blogdb
spring.datasource.username=bloguser
spring.datasource.password=blogpass
spring.datasource.driver-class-name=org.postgresql.Driver

# Fallback for H2 in-memory DB
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.platform=postgres

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# SQL Init
# ===============================
spring.sql.init.mode=always
spring.sql.init.platform=postgres

# ===============================
# Profiles
# ===============================
spring.profiles.active=dev

# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ===============================
# JWT
# ===============================
# CHANGE THIS — use a long random secret (e.g. openssl rand -hex 32)
# In production, set JWT_SECRET env variable and reference it here:
#   jwt.secret=${JWT_SECRET}
jwt.secret=WsF6Xl9s8a2v3n4p5q6r7s8t9u0w1x2y3z4a5b6c7d8e9f0g1h2i3j4k5l6m7n8o9p0
jwt.expiration-ms=86400000

# ===============================
# CORS
# ===============================
# Comma-separated list of allowed origins.
# In production, set the env variable or override here.
cors.allowed-origins=http://localhost:4200,http://localhost:3000
